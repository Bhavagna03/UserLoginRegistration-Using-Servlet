<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>List Users</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#eaf2ff;
}

/* Page container */
.container{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.card{
    background:white;
    width:420px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
}

/* Heading */
.card h2{
    margin-bottom:20px;
    color:#0b5ed7;
}

/* Button */
.btn{
    display:inline-block;
    padding:12px 30px;
    background:#0b5ed7;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:16px;
}

.btn:hover{
    background:#084298;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>📋 View All Registered Users</h2>

        <!-- IMPORTANT -->
        <!-- This calls servlet -->
        <a href="list.do" class="btn">List Users</a>
    </div>
</div>

</body>
</html>
