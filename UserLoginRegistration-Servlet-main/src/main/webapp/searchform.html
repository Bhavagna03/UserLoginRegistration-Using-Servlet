<!DOCTYPE html>
<html>
<head>
<style>
body{background:#f4f8ff;font-family:Segoe UI;}
.card{
  background:white;
  width:350px;
  margin:80px auto;
  padding:30px;
  border-radius:15px;
}
input,button{width:100%;padding:10px;margin-top:10px;}
button{background:#198754;color:white;border:none;}
</style>
</head>
<body>
<div class="card">
<h2>User Login</h2>
<form action="login.do" method="post">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>
</div>
</body>
</html>
